name: TaxOps Daily SLA Watch (9 AM UTC Mon-Fri)

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL:        ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL:           ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN:       ${{ secrets.JIRA_API_TOKEN }}
      SLACK_WEBHOOK_OPS:    ${{ secrets.SLACK_WEBHOOK_OPS }}
      SLACK_WEBHOOK_EXEC:   ${{ secrets.SLACK_WEBHOOK_EXEC }}
      RANA_SLACK_UID:       ${{ secrets.RANA_SLACK_UID }}
      ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r taxops/requirements.txt
      - name: A5 - Priority SLA Watcher
        working-directory: taxops
        run: python a5_sla_watcher.py
