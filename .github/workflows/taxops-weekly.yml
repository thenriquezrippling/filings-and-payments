name: TaxOps Weekly Digest (Mon 12 PM ET)

on:
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    permissions: 
      contents: write
    env:
      JIRA_BASE_URL:        ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL:           ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN:       ${{ secrets.JIRA_API_TOKEN }}
      SLACK_WEBHOOK_OPS:    ${{ secrets.SLACK_WEBHOOK_OPS }}
      SLACK_WEBHOOK_EXEC:   ${{ secrets.SLACK_WEBHOOK_EXEC }}
      ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r taxops/requirements.txt
      - name: A6 - Weekly Executive QA Digest
        working-directory: taxops
        run: python a6_weekly_digest.py
      - name: Commit WoW history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add taxops/wbr_history.json
          git diff --staged --quiet || git commit -m "chore: update WBR history [skip ci]"
          git push
